<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bancolombia · ODL Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{margin:0;background:#E5E5E7;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif}
  button:active{transform:scale(0.97)}
  input:focus{border-color:#1A1A1A!important;box-shadow:0 0 0 3px rgba(0,0,0,0.06)}
  ::-webkit-scrollbar{width:0}
  @keyframes bspin{to{transform:rotate(360deg)}}
  @keyframes bpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.05)}}
  @keyframes bpop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes barGrow{from{width:0}to{width:var(--bar-w)}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

const FONT="'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif";
const MONO="'JetBrains Mono','SF Mono',monospace";
const API_DEFAULT=window.location.origin!=="null"&&!window.location.origin.startsWith("file")?window.location.origin:"http://localhost:8788";

// ═══ SVG ICONS ═══
const IC={
  wallet:<svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M21 7H3a2 2 0 00-2 2v9a2 2 0 002 2h18a2 2 0 002-2V9a2 2 0 00-2-2z"/><circle cx="16" cy="14" r="1" fill="currentColor" stroke="none"/><path d="M3 7V5a2 2 0 012-2h14a2 2 0 012 2v2"/></svg>,

  search:<svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>,

  chev:<svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>,
  bolt:<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
  ref:<svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>,
  lock:<svg width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>,
  star:<svg width="12" height="12" viewBox="0 0 24 24" fill="#FDDA24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
  app:<svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="3"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/></svg>,
  web:<svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>,
  atm:<svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M12 7v4m-3 0h6"/><circle cx="8" cy="15" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="15" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="15" r="1" fill="currentColor" stroke="none"/></svg>,
  suc:<svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M3 21h18M5 21V7l7-4 7 4v14"/><path d="M9 21v-4h6v4M9 10h1M14 10h1M9 14h1M14 14h1"/></svg>,
  neq:<svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
  play:<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>,
  check:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>,
  pulse:<svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
  chat:<svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>,
  sparkle:<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>,
  mic:<svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><rect x="9" y="1" width="6" height="11" rx="3"/><path d="M19 10v1a7 7 0 01-14 0v-1"/><path d="M12 18v4M8 22h8"/></svg>,
};
const chI=c=>({APP:IC.app,WEB:IC.web,ATM:IC.atm,SUC:IC.suc,NEQ:IC.neq}[c]||IC.app);
const fmt=n=>n==null?"$0":"$"+Math.round(n).toLocaleString("es-CO");
const fD=d=>{if(!d)return"";try{return new Date(d).toLocaleDateString("es-CO",{day:"numeric",month:"short"})}catch{return String(d).slice(0,10)}};
const fT=h=>h?h.substring(0,5):"";
const sg=(o,...k)=>{let c=o;for(const i of k){if(!c||typeof c!=="object")return null;c=c[i]}return c};

function useApi(base){
  const [loading,setLoading]=useState(false);
  const [ms,setMs]=useState(null);
  const call=useCallback(async(path,opts={})=>{
    setLoading(true);setMs(null);
    const t0=performance.now();
    try{
      const r=await fetch(`${base}${path}`,opts);
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||`Error ${r.status}`);}
      const d=await r.json();
      const elapsed=Math.round(performance.now()-t0);
      setMs(d._meta?.query_time_ms??d.query_time_ms??elapsed);
      return d;
    }finally{setLoading(false);}
  },[base]);
  return {call,loading,ms};
}

function Pill({ms,label,dark}){
  if(ms==null)return null;
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,background:dark?"rgba(253,218,36,0.15)":`${B.yellow}20`,border:`1px solid ${dark?"rgba(253,218,36,0.3)":B.yellow+"40"}`,borderRadius:100,padding:"3px 10px 3px 8px",fontSize:11,fontWeight:600,fontFamily:MONO,color:dark?B.yellow:B.dark}}>
    <span style={{display:"flex",color:dark?B.yellow:B.yellowDark}}>{IC.bolt}</span>
    {label?`${label}: `:""}{ms}ms
  </span>;
}
function Spin(){return <div style={{display:"flex",justifyContent:"center",padding:48}}><div style={{width:28,height:28,border:`2.5px solid ${B.g200}`,borderTopColor:B.black,borderRadius:"50%",animation:"bspin .7s linear infinite"}}/></div>}
function Tag({children,active,onClick}){return <button onClick={onClick} style={{padding:"7px 16px",borderRadius:100,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT,transition:"all .15s",border:active?`1.5px solid ${B.black}`:`1px solid ${B.g300}`,background:active?B.black:B.white,color:active?B.white:B.g600}}>{children}</button>}

// ═══════════════════════════════════════════════
// SLA BAR
// ═══════════════════════════════════════════════
function SlaBar({ms,label}){
  if(ms==null)return null;
  const SLA=400;
  const pct=Math.min((ms/SLA)*100,100);
  const ratio=Math.round(SLA/Math.max(ms,0.1));
  const good=ms<SLA;
  return(
    <div style={{background:B.offWhite,borderRadius:14,padding:"14px 16px",border:`1px solid ${B.g200}`,margin:"0 0 12px",animation:"fadeIn 0.3s ease-out"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:10,fontWeight:700,color:B.g500,textTransform:"uppercase",letterSpacing:0.5}}>{label||"ODL"} vs SLA</span>
        {good&&<span style={{fontSize:10,fontWeight:700,color:B.up,background:`${B.up}15`,padding:"2px 8px",borderRadius:100}}>{ratio}× más rápido</span>}
      </div>
      <div style={{position:"relative",height:8,background:B.g200,borderRadius:4,overflow:"hidden"}}>
        <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${Math.max(pct,1.5)}%`,background:good?`linear-gradient(90deg,${B.up},${B.mint})`:B.down,borderRadius:4,transition:"width 0.6s ease-out"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:8,height:8,borderRadius:2,background:good?B.up:B.down}}/>
          <span style={{fontSize:12,fontWeight:700,color:good?B.up:B.down,fontFamily:MONO}}>{ms}ms</span>
          <span style={{fontSize:10,color:B.g500}}>ODL</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <span style={{fontSize:10,color:B.g500}}>SLA</span>
          <span style={{fontSize:12,fontWeight:600,color:B.g600,fontFamily:MONO}}>400ms</span>
          <div style={{width:8,height:8,borderRadius:2,background:B.g400}}/>
        </div>
      </div>
    </div>
  );
}

// ═══ SESSION BADGE ═══
const _ss={q:0,t:0};
function SessionBadge({ms}){
  const [s,setS]=useState({q:0,a:0});
  useEffect(()=>{
    if(ms!=null&&ms>0){_ss.q+=1;_ss.t+=ms;setS({q:_ss.q,a:Math.round(_ss.t/_ss.q)});}
  },[ms]);
  if(s.q<2)return null;
  return <div style={{display:"flex",justifyContent:"center",marginBottom:10}}>
    <span style={{fontSize:10,color:B.g500,fontFamily:MONO,background:B.offWhite,padding:"4px 12px",borderRadius:100,border:`1px solid ${B.g200}`}}>
      {s.q} consultas · promedio {s.a}ms · todas dentro de SLA ✓
    </span>
  </div>;
}

// ═══ TX TYPES ═══
const TX_TYPES=[
  {key:"NOMINA",label:"Nómina",icon:"💰",signo:"C"},
  {key:"TRANSFERENCIA_RECIBIDA",label:"Transferencia",icon:"↗️",signo:"C"},
  {key:"RETIRO_ATM",label:"Retiro ATM",icon:"🏧",signo:"D"},
  {key:"COMPRA_WEB",label:"Compra Web",icon:"🛒",signo:"D"},
  {key:"PAGO_SERVICIO",label:"Pago Servicios",icon:"📄",signo:"D"},
];

// ═══════════════════════════════════════════════
// SYNC TIMER
// ═══════════════════════════════════════════════
function SyncTimer({startTime,active}){
  const [elapsed,setElapsed]=useState(0);
  const ref=useRef(null);
  useEffect(()=>{
    if(active&&startTime){
      const tick=()=>{setElapsed(Date.now()-startTime);ref.current=requestAnimationFrame(tick);};
      ref.current=requestAnimationFrame(tick);
      return()=>cancelAnimationFrame(ref.current);
    }
  },[active,startTime]);
  return <span style={{fontFamily:MONO,fontSize:11,color:B.yellow}}>{(elapsed/1000).toFixed(1)}s</span>;
}

// ═══════════════════════════════════════════════
// SIMULATION PANEL v2
// ═══════════════════════════════════════════════
function SimulationPanel({cuenta,apiBase,onSaldoUpdate}){
  const [state,setState]=useState("idle");
  const [selectedTx,setSelectedTx]=useState(null);
  const [result,setResult]=useState(null);
  const [saldoAnterior,setSaldoAnterior]=useState(null);
  const [syncStart,setSyncStart]=useState(null);
  const [syncMs,setSyncMs]=useState(null);
  const [error,setError]=useState(null);
  const pollRef=useRef(null);
  const pollCount=useRef(0);

  const reset=()=>{
    setState("idle");setSelectedTx(null);setResult(null);
    setSaldoAnterior(null);setSyncStart(null);setSyncMs(null);setError(null);
    pollCount.current=0;if(pollRef.current)clearInterval(pollRef.current);
  };

  const startSim=async(txType)=>{
    setSelectedTx(txType);setState("processing");setError(null);setSyncMs(null);
    try{
      const sR=await fetch(`${apiBase}/api/v1/cuentas/${cuenta}/saldo`);
      if(!sR.ok) throw new Error(`Error obteniendo saldo (${sR.status})`);
      const sD=await sR.json();const sP=sD?.saldo?.actual||0;setSaldoAnterior(sP);
      const res=await fetch(`${apiBase}/api/v1/cuentas/${cuenta}/simular-movimiento`,{
        method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tipo:txType.key}),
      });
      if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.detail||`Error ${res.status}`);}
      const data=await res.json();setResult(data);
      setState("syncing");const t0=Date.now();setSyncStart(t0);pollCount.current=0;
      const pollFn=async()=>{
        pollCount.current+=1;
        try{
          const cR=await fetch(`${apiBase}/api/v1/cuentas/${cuenta}/verificar-cambio?saldo_anterior=${sP}${data.demo_id?`&demo_id=${data.demo_id}`:""}`);
          if(!cR.ok) return;
          const cD=await cR.json();
          if(cD.cambio_detectado){
            clearInterval(pollRef.current);const ms=Date.now()-t0;
            setSyncMs(ms);setState("done");
            setResult(prev=>({...prev,saldo_nuevo_real:cD.saldo_actual,latencias_asp:cD.latencias,sync_ms:ms}));
            if(onSaldoUpdate)onSaldoUpdate();return;
          }
          if(pollCount.current>400){
            clearInterval(pollRef.current);setSyncMs(Date.now()-t0);setState("done");
            setResult(prev=>({...prev,timeout:true,sync_ms:Date.now()-t0}));
          }
        }catch{}
      };
      pollFn();
      pollRef.current=setInterval(pollFn,150);
    }catch(e){setState("error");setError(e.message);}
  };

  useEffect(()=>()=>{if(pollRef.current)clearInterval(pollRef.current);},[]);

  // ── IDLE ──
  if(state==="idle"){
    return(
      <div style={{margin:"0 0 16px",borderRadius:20,overflow:"hidden",border:"1px solid rgba(253,218,36,0.2)"}}>
        <div style={{background:`linear-gradient(135deg,${B.darkest},#1a1520)`,padding:"20px 20px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{display:"flex",color:B.yellow}}>{IC.pulse}</span>
            <span style={{fontSize:13,fontWeight:700,color:B.white}}>Simular Transacción</span>
            <span style={{fontSize:9,fontWeight:600,color:B.yellow,background:"rgba(253,218,36,0.15)",padding:"2px 8px",borderRadius:100,letterSpacing:0.5,textTransform:"uppercase"}}>LIVE</span>
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",lineHeight:1.5,marginBottom:16}}>
            Simula una transacción del iSeries y observa cómo el ODL se sincroniza automáticamente vía el pipeline CDC.
          </div>
          <button onClick={()=>setState("selecting")} style={{width:"100%",padding:"14px 0",borderRadius:14,border:"none",background:B.yellow,color:B.darkest,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:FONT,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <span style={{display:"flex"}}>{IC.play}</span> Simular Transacción
          </button>
        </div>
      </div>
    );
  }

  // ── SELECTING ──
  if(state==="selecting"){
    return(
      <div style={{margin:"0 0 16px",borderRadius:20,overflow:"hidden",border:"1px solid rgba(253,218,36,0.2)"}}>
        <div style={{background:`linear-gradient(135deg,${B.darkest},#1a1520)`,padding:"20px 20px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontSize:13,fontWeight:700,color:B.white}}>Tipo de transacción</span>
            <button onClick={reset} style={{background:"none",border:"none",color:B.g400,fontSize:11,cursor:"pointer",fontFamily:FONT}}>Cancelar</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {TX_TYPES.map(tx=>(
              <button key={tx.key} onClick={()=>startSim(tx)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:B.white,cursor:"pointer",fontFamily:FONT,textAlign:"left",transition:"all 0.15s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(253,218,36,0.1)";e.currentTarget.style.borderColor="rgba(253,218,36,0.3)";}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.04)";e.currentTarget.style.borderColor="rgba(255,255,255,0.08)";}}>
                <span style={{fontSize:20,width:32,textAlign:"center"}}>{tx.icon}</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{tx.label}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:1}}>{tx.signo==="C"?"Crédito (+)":"Débito (−)"}</div></div>
                <div style={{color:"rgba(255,255,255,0.2)"}}>{IC.chev}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── ACTIVE ──
  const isDone=state==="done",isError=state==="error",isSyncing=state==="syncing",isProc=state==="processing",timedOut=isDone&&result?.timeout;
  return(
    <div style={{margin:"0 0 16px",borderRadius:20,overflow:"hidden",border:`1px solid ${isDone&&!timedOut?B.up+"40":isError?B.down+"40":"rgba(253,218,36,0.2)"}`}}>
      <div style={{background:`linear-gradient(135deg,${B.darkest},${isDone&&!timedOut?"#0a1a12":isError?"#1a0a0a":"#1a1520"})`,padding:"20px 20px 18px"}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>{selectedTx?.icon}</span>
            <span style={{fontSize:13,fontWeight:700,color:B.white}}>{selectedTx?.label}</span>
            {result?.transaccion?.monto_formateado&&<span style={{fontSize:11,fontWeight:600,color:selectedTx?.signo==="C"?B.up:B.down,fontFamily:MONO}}>{selectedTx?.signo==="C"?"+":"−"}{result.transaccion.monto_formateado}</span>}
          </div>
          {(isDone||isError)&&<button onClick={reset} style={{padding:"5px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.6)",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>Nueva</button>}
        </div>

        {/* STEP 1: iSeries */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderRadius:12,marginBottom:8,background:isProc?"rgba(253,218,36,0.08)":`${B.up}12`,border:`1px solid ${isProc?"rgba(253,218,36,0.2)":B.up+"30"}`,transition:"all 0.4s"}}>
          <div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,background:isProc?"rgba(253,218,36,0.2)":`${B.up}25`,display:"flex",alignItems:"center",justifyContent:"center",animation:isProc?"bpulse 1s ease-in-out infinite":"none"}}>
            {isProc?<div style={{width:10,height:10,border:"2px solid rgba(253,218,36,0.6)",borderTopColor:B.yellow,borderRadius:"50%",animation:"bspin 0.6s linear infinite"}}/>:<span style={{color:B.up,fontSize:14,fontWeight:800}}>✓</span>}
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:isProc?B.yellow:B.up}}>{isProc?"Procesando en iSeries...":"iSeries procesó la transacción"}</div>
            {!isProc&&<div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:2}}>Confirmación instantánea al canal de origen</div>}
          </div>
        </div>

        {/* STEP 2: ODL Sync */}
        {(isSyncing||isDone)&&(
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderRadius:12,marginBottom:8,background:isDone&&!timedOut?`${B.up}12`:isSyncing?"rgba(253,218,36,0.06)":"rgba(255,90,95,0.08)",border:`1px solid ${isDone&&!timedOut?B.up+"30":isSyncing?"rgba(253,218,36,0.15)":B.down+"30"}`,transition:"all 0.4s",animation:"fadeIn 0.3s ease-out"}}>
            <div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,background:isDone&&!timedOut?`${B.up}25`:isSyncing?"rgba(253,218,36,0.15)":"rgba(255,90,95,0.15)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {isSyncing?<div style={{width:10,height:10,border:"2px solid rgba(253,218,36,0.4)",borderTopColor:B.yellow,borderRadius:"50%",animation:"bspin 0.8s linear infinite"}}/>
              :isDone&&!timedOut?<span style={{color:B.up,fontSize:14,fontWeight:800}}>✓</span>
              :<span style={{color:B.down,fontSize:12}}>⏱</span>}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:isDone&&!timedOut?B.up:isSyncing?"rgba(255,255,255,0.7)":B.down}}>
                {isSyncing?"Sincronizando con ODL...":isDone&&!timedOut?"Disponible en ODL":"Timeout — verificar pipeline"}
              </div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:2,fontFamily:MONO}}>
                {isSyncing?<span>CDC → Kafka → ASP → MongoDB · <SyncTimer startTime={syncStart} active={true}/></span>
                :isDone&&syncMs!=null?`Pipeline completado en ${(syncMs/1000).toFixed(1)}s`:""}
              </div>
            </div>
          </div>
        )}

        {isError&&<div style={{background:"rgba(255,90,95,0.1)",border:"1px solid rgba(255,90,95,0.2)",borderRadius:12,padding:"12px 14px",marginBottom:8}}><div style={{fontSize:11,color:B.down,fontWeight:600}}>Error: {error}</div></div>}

        {/* DONE */}
        {isDone&&!timedOut&&result&&(
          <div style={{marginTop:6,animation:"fadeIn 0.4s ease-out"}}>
            <div style={{background:"rgba(0,196,140,0.08)",border:"1px solid rgba(0,196,140,0.2)",borderRadius:14,padding:"14px 16px",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,color:B.up,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Saldo actualizado en ODL</div>
                  <div style={{fontSize:22,fontWeight:800,color:B.up,marginTop:4,fontFamily:MONO,letterSpacing:-1}}>{fmt(result.saldo_nuevo_real||result.saldo_esperado)}</div>
                </div>
                <div style={{width:44,height:44,borderRadius:"50%",background:"rgba(0,196,140,0.15)",display:"flex",alignItems:"center",justifyContent:"center",color:B.up,animation:"bpop 0.5s ease-out"}}>{IC.check}</div>
              </div>
              {saldoAnterior!=null&&(
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,fontSize:11,color:"rgba(255,255,255,0.4)",fontFamily:MONO}}>
                  <span>{fmt(saldoAnterior)}</span><span style={{color:B.yellow}}>→</span>
                  <span style={{color:B.up,fontWeight:600}}>{fmt(result.saldo_nuevo_real||result.saldo_esperado)}</span>
                  <span style={{marginLeft:"auto",color:selectedTx?.signo==="C"?B.up:B.down,fontWeight:600}}>{selectedTx?.signo==="C"?"+":"−"}{fmt(result?.transaccion?.monto)}</span>
                </div>
              )}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
              {[{l:"Pipeline",v:`${((syncMs||0)/1000).toFixed(1)}s`,c:B.yellow},{l:"Modo",v:result.pipeline?.modo==="kafka"?"Kafka→ASP":"Directo",c:B.info},{l:"Fragmentos",v:result.pipeline?.fragmentos_enviados||3,c:B.white}].map((m,i)=>(
                <div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 10px",textAlign:"center"}}>
                  <div style={{fontSize:8,color:"rgba(255,255,255,0.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>{m.l}</div>
                  <div style={{fontSize:14,fontWeight:700,color:m.c,marginTop:3,fontFamily:MONO}}>{m.v}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const _SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition||null;
const _synth=window.speechSynthesis;

function useSpeech(){
  const [listening,setListening]=useState(false);
  const [speaking,setSpeaking]=useState(false);
  const [hasSTT]=useState(!!_SpeechRecognition);
  const [hasTTS]=useState(true);  // OpenAI TTS API + browser fallback
  const recRef=useRef(null);
  const audioRef=useRef(null);

  const startListening=useCallback((onResult,onEnd)=>{
    if(!_SpeechRecognition)return;
    if(recRef.current)try{recRef.current.abort()}catch{}
    const rec=new _SpeechRecognition();
    rec.lang="es-CO";rec.continuous=false;rec.interimResults=true;rec.maxAlternatives=1;
    let finalText="";
    rec.onresult=e=>{
      let interim="",final="";
      for(let i=0;i<e.results.length;i++){
        if(e.results[i].isFinal)final+=e.results[i][0].transcript;
        else interim+=e.results[i][0].transcript;
      }
      finalText=final||interim;
      if(onResult)onResult(finalText,!e.results[e.results.length-1].isFinal);
    };
    rec.onend=()=>{setListening(false);if(onEnd)onEnd(finalText);};
    rec.onerror=e=>{setListening(false);if(e.error!=="aborted"&&onEnd)onEnd("");};
    recRef.current=rec;rec.start();setListening(true);
  },[]);

  const stopListening=useCallback(()=>{
    if(recRef.current)try{recRef.current.stop()}catch{}
    setListening(false);
  },[]);

  const speak=useCallback((text,apiBase)=>{
    if(!text)return;
    // Backend handles text cleaning (markdown, money formats, emojis)
    setSpeaking(true);
    fetch(`${apiBase||window.__ttsApiBase||""}/api/v1/tts`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text:text})
    }).then(r=>{
      if(!r.ok)throw new Error("TTS API unavailable");
      return r.blob();
    }).then(blob=>{
      const url=URL.createObjectURL(blob);
      const audio=new Audio(url);
      audioRef.current=audio;
      audio.onended=()=>{setSpeaking(false);URL.revokeObjectURL(url);};
      audio.onerror=()=>{setSpeaking(false);URL.revokeObjectURL(url);};
      audio.play();
    }).catch(()=>{
      // Fallback: browser speechSynthesis
      if(!_synth){setSpeaking(false);return;}
      _synth.cancel();
      const clean=text.replace(/[\*\#\_\|]/g,"").replace(/\n+/g,". ").slice(0,4000);
      const chunks=[];
      const sentences=clean.split(/(?<=[.!?])\s+/);
      let current="";
      for(const s of sentences){
        if((current+" "+s).length>200){if(current)chunks.push(current);current=s;}
        else current=current?current+" "+s:s;
      }
      if(current)chunks.push(current);
      let idx=0;
      const speakNext=()=>{
        if(idx>=chunks.length){setSpeaking(false);return;}
        const utt=new SpeechSynthesisUtterance(chunks[idx]);
        utt.lang="es-CO";utt.rate=1.05;utt.pitch=1.0;
        const voices=_synth.getVoices();
        const esVoice=voices.find(v=>v.lang.startsWith("es")&&v.name.includes("female"))
          ||voices.find(v=>v.lang.startsWith("es"));
        if(esVoice)utt.voice=esVoice;
        utt.onend=()=>{idx++;speakNext();};
        utt.onerror=()=>{setSpeaking(false);};
        _synth.speak(utt);
      };
      if(_synth.getVoices().length===0)_synth.onvoiceschanged=()=>speakNext();
      else speakNext();
    });
  },[]);

  const stopSpeaking=useCallback(()=>{
    if(audioRef.current){try{audioRef.current.pause();audioRef.current=null;}catch{}}
    if(_synth)_synth.cancel();
    setSpeaking(false);
  },[]);

  return {listening,speaking,hasSTT,hasTTS,startListening,stopListening,speak,stopSpeaking};
}

function TabAsistente({cuenta,apiBase}){
  const [state,setState]=useState("idle"); // idle, listening, thinking, loading_voice, speaking
  const [transcript,setTranscript]=useState("");
  const [response,setResponse]=useState("");
  const [history,setHistory]=useState([]);
  const [textInput,setTextInput]=useState("");
  const audioRef=useRef(null);
  const recRef=useRef(null);
  const primedRef=useRef(false);
  const _SR=window.SpeechRecognition||window.webkitSpeechRecognition||null;

  // Pre-create a persistent Audio element (iOS requires same element from user gesture)
  const getAudio=useCallback(()=>{
    if(!audioRef.current){
      audioRef.current=new Audio();
      audioRef.current.playsInline=true;
      audioRef.current.setAttribute("playsinline","");
    }
    return audioRef.current;
  },[]);

  // Prime audio ONCE per session — iOS requires play() from a user gesture to unlock
  const primeAudioOnce=()=>{
    if(primedRef.current)return;
    const a=getAudio();
    a.src="data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYoRwMHAAAAAAD/+1DEAAAGAAGn9AAAIiKmrv80QQBAAAANIAAAAADM/+r/KAoGBwfB8Hw+D4fggCAJh+D4Pg+CAYBA0CAAAAAAA//tQxBQAAADSAAAAAAAAANIAAAAASZn/1f5QEAwOD4Ph8Hw+D8EAQBMPwfB8HwQBgEDQIAAAAAAA";
    a.volume=0.01;
    const p=a.play();
    if(p&&p.then)p.then(()=>{a.pause();a.volume=1.0;primedRef.current=true;}).catch(()=>{primedRef.current=true;});
  };

  const stopAudio=()=>{
    const a=audioRef.current;
    if(a){
      try{a.pause();a.currentTime=0;}catch{}
      a.onended=null;a.onerror=null;
    }
    if(window.speechSynthesis)window.speechSynthesis.cancel();
  };

  const speakResponse=(text,showText)=>{
    let ttsText=text;
    if(ttsText.length>500){
      const cut=ttsText.substring(0,500);
      const lastDot=Math.max(cut.lastIndexOf("."),cut.lastIndexOf("!"),cut.lastIndexOf("?"));
      ttsText=lastDot>200?cut.substring(0,lastDot+1):cut+"...";
    }
    setState("loading_voice");
    const safety=setTimeout(()=>{setResponse(text);setState("idle");},30000);
    fetch(`${apiBase}/api/v1/tts`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text:ttsText})
    }).then(r=>{
      if(!r.ok)throw new Error("TTS unavailable");
      return r.blob();
    }).then(blob=>{
      const url=URL.createObjectURL(blob);
      const a=getAudio();
      a.onended=null;a.onerror=null;
      if(a._blobUrl)try{URL.revokeObjectURL(a._blobUrl);}catch{}
      a._blobUrl=url;a.src=url;a.volume=1.0;
      // Show text + play audio at the same time
      a.onended=()=>{clearTimeout(safety);setState("idle");};
      a.onerror=()=>{clearTimeout(safety);setState("idle");};
      setResponse(text);
      setState("speaking");
      const p=a.play();
      if(p&&p.catch)p.catch(()=>{
        clearTimeout(safety);
        const synth=window.speechSynthesis;
        if(synth){
          synth.cancel();
          const clean=text.replace(/[\*\#\_\|]/g,"").replace(/\n+/g,". ").slice(0,300);
          const utt=new SpeechSynthesisUtterance(clean);
          utt.lang="es-CO";utt.rate=1.05;
          utt.onend=()=>setState("idle");
          utt.onerror=()=>setState("idle");
          synth.speak(utt);
        }else setState("idle");
      });
    }).catch(()=>{
      clearTimeout(safety);
      setResponse(text);
      const synth=window.speechSynthesis;
      if(synth){
        synth.cancel();
        setState("speaking");
        const clean=text.replace(/[\*\#\_\|]/g,"").replace(/\n+/g,". ").slice(0,300);
        const utt=new SpeechSynthesisUtterance(clean);
        utt.lang="es-CO";utt.rate=1.05;
        utt.onend=()=>setState("idle");
        utt.onerror=()=>setState("idle");
        synth.speak(utt);
      }else setState("idle");
    });
  };

  const sendQuery=async(text)=>{
    setState("thinking");
    setResponse("");
    try{
      const r=await fetch(`${apiBase}/api/v1/chat`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({pregunta:text,cuenta,meses:3,limit:10,voice:true})
      });
      const d=await r.json();
      if(!r.ok)throw new Error(d.detail||"Error");
      const resp=d.respuesta;
      setHistory(prev=>[...prev.slice(-4),{q:text,a:resp}]);
      // Don't show text yet — speakResponse will show text + audio together
      speakResponse(resp);
    }catch(e){
      setResponse("Lo siento, tuve un problema al procesar tu pregunta.");
      setState("idle");
    }
  };

  const toggleVoice=()=>{
    if(state==="listening"){
      if(recRef.current)try{recRef.current.stop();}catch{}
      setState("idle");
      return;
    }
    if(state==="speaking"||state==="loading_voice"){
      stopAudio();
      setState("idle");
      return;
    }
    if(state==="thinking")return;

    // Unlock audio element once (iOS needs user gesture); don't re-prime on subsequent taps
    primeAudioOnce();
    // Stop any leftover audio without destroying the element
    stopAudio();

    if(!_SR){setResponse("Tu navegador no soporta reconocimiento de voz");return;}

    setState("listening");
    setTranscript("");
    setResponse("");
    // Small delay so iOS finishes releasing audio focus before mic starts
    setTimeout(()=>{
      const rec=new _SR();
      rec.lang="es-CO";rec.continuous=false;rec.interimResults=true;
      let finalText="";
      let silenceTimer=null;
      let maxTimer=setTimeout(()=>{try{rec.stop();}catch{}},15000);
      const resetSilence=()=>{
        if(silenceTimer)clearTimeout(silenceTimer);
        silenceTimer=setTimeout(()=>{try{rec.stop();}catch{}},3000);
      };
      rec.onresult=e=>{
        let interim="",final="";
        for(let i=0;i<e.results.length;i++){
          if(e.results[i].isFinal)final+=e.results[i][0].transcript;
          else interim+=e.results[i][0].transcript;
        }
        finalText=final||interim;
        setTranscript(finalText);
        resetSilence();
      };
      rec.onend=()=>{
        if(silenceTimer)clearTimeout(silenceTimer);
        clearTimeout(maxTimer);
        if(finalText&&finalText.trim().length>2){
          setTranscript(finalText);
          sendQuery(finalText.trim());
        }else setState("idle");
      };
      rec.onerror=e=>{
        if(silenceTimer)clearTimeout(silenceTimer);
        clearTimeout(maxTimer);
        if(e.error!=="aborted"&&e.error!=="no-speech")setState("idle");
      };
      recRef.current=rec;
      try{rec.start();}catch(e){clearTimeout(maxTimer);setState("idle");}
    },400);
  };

  // Text input submit
  const handleTextSubmit=()=>{
    const q=textInput.trim();
    if(!q||state==="thinking")return;
    primeAudioOnce(); // Unlock audio for TTS response
    setTextInput("");
    setTranscript(q);
    sendQuery(q);
  };

  // Ring sizes & colors by state — Bancolombia palette
  const ringConfig={
    idle:{size:130,bg:`linear-gradient(135deg,${B.yellow},${B.yellowDark})`,shadow:`0 8px 40px ${B.yellow}40`,ring:B.yellow},
    listening:{size:150,bg:`linear-gradient(135deg,#FF6B6B,${B.coral})`,shadow:`0 0 60px ${B.coral}50`,ring:B.coral},
    thinking:{size:130,bg:`linear-gradient(135deg,${B.yellow}80,${B.yellowDark}80)`,shadow:`0 8px 30px ${B.yellow}20`,ring:B.yellow},
    loading_voice:{size:130,bg:`linear-gradient(135deg,${B.yellow}80,#4ADE8080)`,shadow:`0 8px 30px ${B.yellow}20`,ring:B.yellow},
    speaking:{size:140,bg:`linear-gradient(135deg,${B.yellow},#4ADE80)`,shadow:`0 0 50px ${B.yellow}40`,ring:"#4ADE80"},
  };
  const rc=ringConfig[state];

  const stateLabel={
    idle:"Toca para hablar",
    listening:"Escuchando...",
    thinking:"Buscando tus movimientos...",
    loading_voice:"Preparando respuesta...",
    speaking:"",
  };

  const stateIcon={
    idle:<svg width="44" height="44" fill="none" stroke={B.darkest} strokeWidth="2" viewBox="0 0 24 24"><rect x="9" y="1" width="6" height="11" rx="3"/><path d="M19 10v1a7 7 0 01-14 0v-1"/><path d="M12 18v4M8 22h8"/></svg>,
    listening:<svg width="44" height="44" fill="none" stroke={B.darkest} strokeWidth="2" viewBox="0 0 24 24"><rect x="9" y="1" width="6" height="11" rx="3"/><path d="M19 10v1a7 7 0 01-14 0v-1"/><path d="M12 18v4M8 22h8"/></svg>,
    thinking:<svg width="36" height="36" viewBox="0 0 24 24" fill={B.darkest}><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>,
    loading_voice:<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke={B.darkest} strokeWidth="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 010 7.07" opacity="0.4"/><path d="M19.07 4.93a10 10 0 010 14.14" opacity="0.2"/></svg>,
    speaking:<svg width="40" height="40" fill="none" stroke={B.darkest} strokeWidth="2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>,
  };

  const suggestions=["¿Cuánto gasté este mes?","¿Cuáles son mis retiros?","Dame consejos financieros"];

  return <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 130px)",background:`linear-gradient(180deg,${B.darkest} 0%,#111118 40%,#1a1a24 100%)`,position:"relative",overflow:"hidden"}}>

    {/* Bancolombia header */}
    <div style={{padding:"20px 24px 0",textAlign:"center"}}>
      <div style={{display:"inline-flex",alignItems:"center",gap:8,marginBottom:6}}>
        <div style={{width:28,height:28,borderRadius:8,background:B.yellow,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16,color:B.darkest,fontFamily:FONT}}>C</div>
        <span style={{fontSize:16,fontWeight:700,color:B.white,letterSpacing:-0.3}}>Asistente Virtual</span>
      </div>
      <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2}}>Bancolombia · Inteligencia Artificial</div>
    </div>

    {/* Main content area */}
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative"}}>

      {/* Ambient rings */}
      {(state==="listening"||state==="speaking"||state==="loading_voice")&&<>
        <div style={{position:"absolute",width:260,height:260,borderRadius:"50%",border:`2px solid ${rc.ring}12`,animation:"voicePulse 2s ease-in-out infinite"}}/>
        <div style={{position:"absolute",width:320,height:320,borderRadius:"50%",border:`1.5px solid ${rc.ring}08`,animation:"voicePulse 2s ease-in-out 0.3s infinite"}}/>
        <div style={{position:"absolute",width:380,height:380,borderRadius:"50%",border:`1px solid ${rc.ring}06`,animation:"voicePulse 2s ease-in-out 0.6s infinite"}}/>
      </>}
      {state==="idle"&&!response&&<>
        <div style={{position:"absolute",width:220,height:220,borderRadius:"50%",border:`1px solid ${B.yellow}08`}}/>
        <div style={{position:"absolute",width:280,height:280,borderRadius:"50%",border:`1px solid ${B.yellow}05`}}/>
      </>}

      {/* Main button */}
      <button onClick={toggleVoice} disabled={state==="thinking"||state==="loading_voice"}
        style={{width:rc.size,height:rc.size,borderRadius:"50%",border:"none",background:rc.bg,boxShadow:rc.shadow,cursor:state==="thinking"||state==="loading_voice"?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.4s cubic-bezier(0.4,0,0.2,1)",zIndex:2,
          animation:state==="listening"?"voicePulse 1.5s ease-in-out infinite":state==="thinking"||state==="loading_voice"?"spin 2s linear infinite":"none"}}>
        {stateIcon[state]}
      </button>

      {/* State label */}
      <div style={{marginTop:20,fontSize:14,fontWeight:600,color:state==="listening"?B.coral:state==="speaking"?B.yellow:state==="loading_voice"?B.yellow:"rgba(255,255,255,0.5)",transition:"color 0.3s",zIndex:2}}>
        {stateLabel[state]}
      </div>

      {/* Loading voice indicator */}
      {state==="loading_voice"&&(
        <div style={{marginTop:12,display:"flex",gap:6,alignItems:"center",zIndex:2}}>
          {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:B.yellow,animation:`loadDots 1.4s ease-in-out ${i*0.2}s infinite`}}/>)}
        </div>
      )}

      {/* Transcript */}
      {transcript&&state==="listening"&&(
        <div style={{marginTop:14,padding:"10px 20px",background:"rgba(253,218,36,0.08)",borderRadius:16,maxWidth:"85%",textAlign:"center",animation:"fadeIn 0.3s",zIndex:2,border:`1px solid ${B.yellow}15`}}>
          <span style={{fontSize:14,color:B.yellow,fontStyle:"italic"}}>"{transcript}"</span>
        </div>
      )}

      {/* Response text */}
      {response&&state!=="listening"&&(
        <div style={{marginTop:18,padding:"16px 20px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,maxWidth:"88%",maxHeight:180,overflowY:"auto",animation:"fadeIn 0.3s",zIndex:2,backdropFilter:"blur(10px)"}}>
          <div style={{fontSize:13,lineHeight:1.6,color:"rgba(255,255,255,0.85)",whiteSpace:"pre-wrap"}}>{response}</div>
        </div>
      )}

      {/* Quick suggestions on idle */}
      {state==="idle"&&!response&&(
        <div style={{marginTop:32,display:"flex",flexDirection:"column",gap:8,alignItems:"center",zIndex:2,maxWidth:"85%"}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:4}}>Prueba preguntar:</div>
          {suggestions.map((s,i)=>(
            <button key={i} onClick={()=>{primeAudio();setTranscript(s);sendQuery(s);}} style={{padding:"10px 18px",borderRadius:100,border:"1px solid rgba(253,218,36,0.15)",background:"rgba(253,218,36,0.06)",color:"rgba(255,255,255,0.6)",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:FONT,transition:"all 0.2s",width:"100%",textAlign:"center"}}>
              {s}
            </button>
          ))}
        </div>
      )}
    </div>

    {/* Text input */}
    <div style={{padding:"8px 16px",zIndex:3}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <input value={textInput} onChange={e=>setTextInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter")handleTextSubmit();}}
          placeholder="Escribe tu pregunta..."
          disabled={state==="thinking"||state==="loading_voice"}
          style={{flex:1,padding:"12px 16px",borderRadius:100,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.06)",color:"white",fontSize:13,fontFamily:FONT,outline:"none"}}/>
        <button onClick={handleTextSubmit} disabled={state==="thinking"||!textInput.trim()}
          style={{width:42,height:42,borderRadius:"50%",border:"none",background:textInput.trim()?B.yellow:"rgba(255,255,255,0.08)",color:B.darkest,display:"flex",alignItems:"center",justifyContent:"center",cursor:textInput.trim()?"pointer":"default",transition:"all 0.2s"}}>
          <svg width="18" height="18" fill="none" stroke={textInput.trim()?B.darkest:"rgba(255,255,255,0.3)"} strokeWidth="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
        </button>
      </div>
    </div>

    {/* Bottom branding */}
    <div style={{padding:"6px 0 12px",textAlign:"center",zIndex:2}}>
      <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 12px",borderRadius:100,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)"}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#00ED64"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14l-1-2H7l4-8h2l-1 4h3l-4 6z"/></svg>
        <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontWeight:600,letterSpacing:0.5}}>POWERED BY MONGODB ATLAS + AI</span>
      </div>
      {history.length>0&&<div style={{display:"flex",gap:5,justifyContent:"center",marginTop:6}}>
        {history.map((_,i)=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:i===history.length-1?B.yellow:"rgba(255,255,255,0.15)"}}/>)}
      </div>}
    </div>

    <style>{`
      @keyframes voicePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:0.7}}
      @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
      @keyframes loadDots{0%,80%,100%{opacity:0}40%{opacity:1}}
    `}</style>
  </div>;
}


// ═══ MAIN ═══
function App(){
  const [apiBase,setApiBase]=useState(API_DEFAULT);
  const [cuenta,setCuenta]=useState(null);
  const [tab,setTab]=useState("saldo");
  const api=useApi(apiBase);
  if(!cuenta)return <Login onLogin={setCuenta} apiBase={apiBase} setApiBase={setApiBase}/>;
  const tabs=[{id:"saldo",label:"Saldo",icon:IC.wallet},{id:"mov",label:"Movimientos",icon:IC.list},{id:"search",label:"Buscar",icon:IC.search},{id:"estado",label:"Extracto",icon:IC.doc},{id:"chat",label:"Chat IA",icon:IC.chat},{id:"voz",label:"Asistente",icon:IC.mic}];
  return <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:B.offWhite,fontFamily:FONT,display:"flex",flexDirection:"column",boxShadow:"0 0 80px rgba(0,0,0,0.06)"}}>
    <div style={{background:B.darkest,color:B.white}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 20px 0",fontSize:10,color:"rgba(255,255,255,0.4)"}}>
        <span style={{display:"flex",alignItems:"center",gap:4}}>{IC.lock} ODL Demo</span>
        <Pill ms={api.ms} dark/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 20px 16px"}}>
        <div><div style={{fontSize:20,fontWeight:800,letterSpacing:-0.5}}>Bancolombia</div><div style={{fontSize:11,color:"rgba(255,255,255,0.45)",fontFamily:MONO,marginTop:2}}>{cuenta}</div></div>
        <button onClick={()=>setCuenta(null)} style={{padding:"7px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.7)",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>Salir</button>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",paddingTop:16}}>
      {tab==="saldo"&&<TabSaldo cuenta={cuenta} api={api} apiBase={apiBase}/>}
      {tab==="mov"&&<TabMov cuenta={cuenta} api={api}/>}
      {tab==="search"&&<TabSearch api={api}/>}
      {tab==="estado"&&<TabEstado cuenta={cuenta} api={api}/>}
      {tab==="chat"&&<TabChat cuenta={cuenta} apiBase={apiBase}/>}
      {tab==="voz"&&<TabAsistente cuenta={cuenta} apiBase={apiBase}/>}
    </div>
    <div style={{display:"flex",borderTop:`1px solid ${B.g200}`,background:B.white,padding:"4px 0 6px"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"9px 0",border:"none",background:"none",cursor:"pointer",transition:"color .15s",color:tab===t.id?B.black:B.g400}}>
        <span style={{display:"flex",transform:tab===t.id?"scale(1.1)":"scale(1)",transition:"transform .15s"}}>{t.icon}</span>
        <span style={{fontSize:10,fontWeight:tab===t.id?700:500,fontFamily:FONT}}>{t.label}</span>
        {tab===t.id&&<div style={{width:4,height:4,borderRadius:2,background:B.yellow,marginTop:-1}}/>}
      </button>)}
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
