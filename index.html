const chI = c => ({APP:I.app,WEB:I.web,ATM:I.atm,SUC:I.suc,NEQ:I.neq}[c]||I.app);
const fmt = n => n==null?"$0":"$"+Math.round(n).toLocaleString("es-CO");
const fD = d => { if(!d)return""; try{return new Date(d).toLocaleDateString("es-CO",{day:"numeric",month:"short"})}catch{return String(d).slice(0,10)}};
const fT = h => h?h.substring(0,5):"";
const sg = (o,...k) => { let c=o; for(const i of k){if(!c||typeof c!=="object")return null; c=c[i]} return c };

function useApi(base) {
  const [loading, setLoading] = useState(false);
  const [ms, setMs] = useState(null);
  const call = useCallback(async (path, opts = {}) => {
    setLoading(true); setMs(null);
    try {
      const r = await fetch(`${base}${path}`, opts);
      if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail||`Error ${r.status}`); }
      const d = await r.json(); setMs(d._meta?.query_time_ms??d.query_time_ms??null); return d;
    } finally { setLoading(false); }
  }, [base]);
  return { call, loading, ms };
}

function Pill({ms,label,dark}){
  if(ms==null) return null;
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,background:dark?"rgba(253,218,36,0.15)":`${B.yellow}20`,border:`1px solid ${dark?"rgba(253,218,36,0.3)":B.yellow+"40"}`,borderRadius:100,padding:"3px 10px 3px 8px",fontSize:11,fontWeight:600,fontFamily:MONO,color:dark?B.yellow:B.dark}}>
    <span style={{display:"flex",color:dark?B.yellow:B.yellowDark}}>{I.bolt}</span>
    {label?`${label}: `:""}{ms}ms
  </span>;
}
function Spin(){return <div style={{display:"flex",justifyContent:"center",padding:48}}><div style={{width:28,height:28,border:`2.5px solid ${B.g200}`,borderTopColor:B.black,borderRadius:"50%",animation:"bspin .7s linear infinite"}}/></div>}
function Tag({children,active,onClick}){return <button onClick={onClick} style={{padding:"7px 16px",borderRadius:100,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT,transition:"all .15s",border:active?`1.5px solid ${B.black}`:`1px solid ${B.g300}`,background:active?B.black:B.white,color:active?B.white:B.g600}}>{children}</button>}

// ═══ TRANSACTION TYPES FOR SIMULATION ═══
const TX_TYPES = [
  { key: "NOMINA", label: "Nómina", icon: "💰", signo: "C" },
  { key: "TRANSFERENCIA_RECIBIDA", label: "Transferencia", icon: "↗️", signo: "C" },
  { key: "RETIRO_ATM", label: "Retiro ATM", icon: "🏧", signo: "D" },
  { key: "COMPRA_WEB", label: "Compra Web", icon: "🛒", signo: "D" },
  { key: "PAGO_SERVICIO", label: "Pago Servicios", icon: "📄", signo: "D" },
];

// ═══ CHRONOMETER COMPONENT ═══
function Chrono({ running, startTime, finalMs }) {
  const [elapsed, setElapsed] = useState(0);
  const frameRef = useRef(null);

  useEffect(() => {
    if (running && startTime) {
      const tick = () => {
        setElapsed(Date.now() - startTime);
        frameRef.current = requestAnimationFrame(tick);
      };
      frameRef.current = requestAnimationFrame(tick);
      return () => cancelAnimationFrame(frameRef.current);
    }
    if (finalMs != null) setElapsed(finalMs);
  }, [running, startTime, finalMs]);

  const display = running ? elapsed : (finalMs ?? elapsed);
  const secs = Math.floor(display / 1000);
  const ms = display % 1000;

  return (
    <div style={{ fontFamily: MONO, fontSize: running ? 32 : 36, fontWeight: 800, letterSpacing: -1.5, color: finalMs != null ? B.up : B.white, textAlign: "center", lineHeight: 1, transition: "color 0.3s" }}>
      {secs > 0 && <span>{secs}.</span>}
      <span>{String(Math.floor(ms)).padStart(secs > 0 ? 3 : 1, "0")}</span>
      <span style={{ fontSize: 14, fontWeight: 500, opacity: 0.6, marginLeft: 2 }}>ms</span>
    </div>
  );
}

// ═══ PIPELINE STAGE INDICATOR ═══
function PipelineStages({ stage }) {
  const stages = [
    { id: "send", label: "Enviando", sub: "3 fragmentos CDC" },
    { id: "kafka", label: "Kafka", sub: "Topic CDC" },
    { id: "asp", label: "ASP", sub: "Ensamblando" },
    { id: "odl", label: "ODL", sub: "MongoDB" },
    { id: "done", label: "Listo", sub: "Confirmado" },
  ];
  const idx = stages.findIndex(s => s.id === stage);

  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 0, padding: "0 8px" }}>
      {stages.map((s, i) => {
        const active = i <= idx;
        const current = i === idx;
        return (
          <div key={s.id} style={{ display: "flex", alignItems: "center" }}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", minWidth: 48 }}>
              <div style={{
                width: 24, height: 24, borderRadius: "50%",
                background: active ? (current ? B.yellow : `${B.up}`) : "rgba(255,255,255,0.1)",
                border: current ? `2px solid ${B.yellow}` : "2px solid transparent",
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "all 0.3s", fontSize: 10, fontWeight: 700,
                color: active ? B.darkest : "rgba(255,255,255,0.3)",
                animation: current ? "bpulse 1.2s ease-in-out infinite" : "none",
              }}>
                {active && i < idx ? "✓" : i + 1}
              </div>
              <div style={{ fontSize: 8, fontWeight: 600, color: active ? "rgba(255,255,255,0.8)" : "rgba(255,255,255,0.25)", marginTop: 3, textTransform: "uppercase", letterSpacing: 0.3, textAlign: "center", lineHeight: 1.2 }}>
                {s.label}
              </div>
            </div>
            {i < stages.length - 1 && (
              <div style={{ width: 16, height: 2, background: i < idx ? B.up : "rgba(255,255,255,0.1)", borderRadius: 1, transition: "background 0.3s", marginBottom: 12 }} />
            )}
          </div>
        );
      })}
    </div>
  );
}

// ═══ READ-YOUR-WRITES SIMULATION PANEL ═══
function SimulationPanel({ cuenta, apiBase, onSaldoUpdate }) {
  const [state, setState] = useState("idle"); // idle | selecting | sending | polling | done | error
  const [selectedTx, setSelectedTx] = useState(null);
  const [startTime, setStartTime] = useState(null);
  const [finalMs, setFinalMs] = useState(null);
  const [pipelineStage, setPipelineStage] = useState("send");
  const [result, setResult] = useState(null);
  const [saldoAnterior, setSaldoAnterior] = useState(null);
  const [error, setError] = useState(null);
  const pollRef = useRef(null);
  const pollCount = useRef(0);

  const reset = () => {
    setState("idle");
    setSelectedTx(null);
    setStartTime(null);
    setFinalMs(null);
    setPipelineStage("send");
    setResult(null);
    setSaldoAnterior(null);
    setError(null);
    pollCount.current = 0;
    if (pollRef.current) clearInterval(pollRef.current);
  };

  const startSimulation = async (txType) => {
    setSelectedTx(txType);
    setState("sending");
    setError(null);
    const t0 = Date.now();
    setStartTime(t0);
    setPipelineStage("send");

    try {
      // 1. Get current saldo first
      const saldoRes = await fetch(`${apiBase}/api/v1/cuentas/${cuenta}/saldo`);
      const saldoData = await saldoRes.json();
      const saldoPrev = saldoData?.saldo?.actual || 0;
      setSaldoAnterior(saldoPrev);

      // 2. POST to simulate transaction
      setPipelineStage("kafka");
      const res = await fetch(`${apiBase}/api/v1/cuentas/${cuenta}/simular-movimiento`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tipo: txType.key }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const data = await res.json();
      setResult(data);

      // 3. Start polling for saldo change
      setState("polling");
      setPipelineStage("asp");
      pollCount.current = 0;

      const expectedSaldo = data.saldo_esperado;
      const demoId = data.demo_id;

      pollRef.current = setInterval(async () => {
        pollCount.current += 1;

        // Update pipeline stage based on elapsed time
        const elapsed = Date.now() - t0;
        if (elapsed > 300 && elapsed < 1500) setPipelineStage("asp");
        if (elapsed > 1500) setPipelineStage("odl");

        try {
          const checkRes = await fetch(
            `${apiBase}/api/v1/cuentas/${cuenta}/verificar-cambio?saldo_anterior=${saldoPrev}${demoId ? `&demo_id=${demoId}` : ""}`
          );
          const checkData = await checkRes.json();

          if (checkData.cambio_detectado) {
            clearInterval(pollRef.current);
            const totalMs = Date.now() - t0;
            setFinalMs(totalMs);
            setPipelineStage("done");
            setState("done");
            setResult(prev => ({
              ...prev,
              saldo_nuevo_real: checkData.saldo_actual,
              latencias_asp: checkData.latencias,
              polls: pollCount.current,
              total_e2e_ms: totalMs,
            }));
            if (onSaldoUpdate) onSaldoUpdate();
          }

          // Timeout after 30 seconds
          if (pollCount.current > 100) {
            clearInterval(pollRef.current);
            setFinalMs(Date.now() - t0);
            setPipelineStage("odl");
            setState("done");
            setResult(prev => ({
              ...prev,
              timeout: true,
              polls: pollCount.current,
              total_e2e_ms: Date.now() - t0,
            }));
          }
        } catch {
          // Ignore polling errors, keep trying
        }
      }, 300);

    } catch (e) {
      setState("error");
      setError(e.message);
      setFinalMs(Date.now() - t0);
    }
  };

  useEffect(() => {
    return () => { if (pollRef.current) clearInterval(pollRef.current); };
  }, []);

  // ── IDLE STATE: Show trigger button ──
  if (state === "idle") {
    return (
      <div style={{ margin: "0 0 16px", borderRadius: 20, overflow: "hidden", border: `1px solid rgba(253,218,36,0.2)` }}>
        <div style={{ background: `linear-gradient(135deg, ${B.darkest}, #1a1520)`, padding: "20px 20px 16px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
            <span style={{ display: "flex", color: B.yellow }}>{I.pulse}</span>
            <span style={{ fontSize: 13, fontWeight: 700, color: B.white, letterSpacing: -0.2 }}>Read-Your-Writes</span>
            <span style={{ fontSize: 9, fontWeight: 600, color: B.yellow, background: "rgba(253,218,36,0.15)", padding: "2px 8px", borderRadius: 100, letterSpacing: 0.5, textTransform: "uppercase" }}>LIVE</span>
          </div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.45)", lineHeight: 1.5, marginBottom: 16 }}>
            Dispara una transacción real que recorre iSeries → Kafka → ASP → MongoDB. Mide la latencia end-to-end en tu dispositivo.
          </div>
          <button
            onClick={() => setState("selecting")}
            style={{
              width: "100%", padding: "14px 0", borderRadius: 14,
              border: "none", background: B.yellow, color: B.darkest,
              fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
              transition: "transform 0.1s",
            }}
            onMouseDown={e => e.currentTarget.style.transform = "scale(0.97)"}
            onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
          >
            <span style={{ display: "flex" }}>{I.play}</span>
            Simular Transacción
          </button>
        </div>
      </div>
    );
  }

  // ── SELECTING STATE: Choose transaction type ──
  if (state === "selecting") {
    return (
      <div style={{ margin: "0 0 16px", borderRadius: 20, overflow: "hidden", border: `1px solid rgba(253,218,36,0.2)` }}>
        <div style={{ background: `linear-gradient(135deg, ${B.darkest}, #1a1520)`, padding: "20px 20px 16px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: B.white }}>Tipo de transacción</span>
            <button onClick={reset} style={{ background: "none", border: "none", color: B.g400, fontSize: 11, cursor: "pointer", fontFamily: FONT }}>Cancelar</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {TX_TYPES.map(tx => (
              <button
                key={tx.key}
                onClick={() => startSimulation(tx)}
                style={{
                  display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",
                  borderRadius: 12, border: "1px solid rgba(255,255,255,0.08)",
                  background: "rgba(255,255,255,0.04)", color: B.white,
                  cursor: "pointer", fontFamily: FONT, textAlign: "left",
                  transition: "all 0.15s",
                }}
                onMouseEnter={e => { e.currentTarget.style.background = "rgba(253,218,36,0.1)"; e.currentTarget.style.borderColor = "rgba(253,218,36,0.3)"; }}
                onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.04)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.08)"; }}
              >
                <span style={{ fontSize: 20, width: 32, textAlign: "center" }}>{tx.icon}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{tx.label}</div>
                  <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", marginTop: 1 }}>
                    {tx.signo === "C" ? "Crédito (+)" : "Débito (−)"}
                  </div>
                </div>
                <div style={{ color: "rgba(255,255,255,0.2)" }}>{I.chev}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── ACTIVE STATES: Sending, Polling, Done, Error ──
  const isDone = state === "done";
  const isError = state === "error";
  const isActive = state === "sending" || state === "polling";

  return (
    <div style={{ margin: "0 0 16px", borderRadius: 20, overflow: "hidden", border: `1px solid ${isDone && !result?.timeout ? B.up + "40" : isError ? B.down + "40" : "rgba(253,218,36,0.2)"}` }}>
      <div style={{ background: `linear-gradient(135deg, ${B.darkest}, ${isDone && !result?.timeout ? "#0a1a12" : isError ? "#1a0a0a" : "#1a1520"})`, padding: "20px 20px 18px" }}>
        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 16 }}>{selectedTx?.icon}</span>
            <span style={{ fontSize: 13, fontWeight: 700, color: B.white }}>{selectedTx?.label}</span>
            {result?.transaccion?.monto_formateado && (
              <span style={{ fontSize: 11, fontWeight: 600, color: selectedTx?.signo === "C" ? B.up : B.down, fontFamily: MONO }}>
                {selectedTx?.signo === "C" ? "+" : "−"}{result.transaccion.monto_formateado}
              </span>
            )}
          </div>
          {(isDone || isError) && (
            <button onClick={reset} style={{ padding: "5px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.06)", color: "rgba(255,255,255,0.6)", fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>
              Reintentar
            </button>
          )}
        </div>

        {/* Chronometer */}
        <div style={{ textAlign: "center", padding: "12px 0 16px", position: "relative" }}>
          {isActive && (
            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
              <div style={{ width: 100, height: 100, borderRadius: "50%", border: `2px solid ${B.yellow}15`, animation: "bpulse 2s ease-in-out infinite" }} />
            </div>
          )}
          <Chrono running={isActive} startTime={startTime} finalMs={finalMs} />
          <div style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", marginTop: 6, fontFamily: MONO }}>
            {isActive ? "Esperando confirmación del ODL..." :
             isDone && !result?.timeout ? "✓ Transacción confirmada end-to-end" :
             isDone && result?.timeout ? "⏱ Timeout — verificar pipeline" :
             isError ? "✕ Error en la simulación" :
             "Latencia end-to-end"}
          </div>
        </div>

        {/* Pipeline Stages */}
        {!isError && <PipelineStages stage={pipelineStage} />}

        {/* Error Message */}
        {isError && (
          <div style={{ background: "rgba(255,90,95,0.1)", border: "1px solid rgba(255,90,95,0.2)", borderRadius: 12, padding: "12px 14px", marginTop: 12 }}>
            <div style={{ fontSize: 11, color: B.down, fontWeight: 600, marginBottom: 4 }}>Error</div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", lineHeight: 1.4 }}>{error}</div>
          </div>
        )}

        {/* Success Result */}
        {isDone && !result?.timeout && result && (
          <div style={{ marginTop: 14 }}>
            {/* Saldo change animation */}
            <div style={{ background: "rgba(0,196,140,0.08)", border: "1px solid rgba(0,196,140,0.2)", borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 10, color: B.up, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Saldo actualizado</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: B.up, marginTop: 4, fontFamily: MONO, letterSpacing: -1 }}>
                    {fmt(result.saldo_nuevo_real || result.saldo_esperado)}
                  </div>
                </div>
                <div style={{ width: 44, height: 44, borderRadius: "50%", background: "rgba(0,196,140,0.15)", display: "flex", alignItems: "center", justifyContent: "center", color: B.up, animation: "bpop 0.5s ease-out" }}>
                  {I.check}
                </div>
              </div>
              {saldoAnterior != null && (
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 8, fontSize: 11, color: "rgba(255,255,255,0.4)", fontFamily: MONO }}>
                  <span>{fmt(saldoAnterior)}</span>
                  <span style={{ color: B.yellow }}>→</span>
                  <span style={{ color: B.up, fontWeight: 600 }}>{fmt(result.saldo_nuevo_real || result.saldo_esperado)}</span>
                  <span style={{ marginLeft: "auto", color: selectedTx?.signo === "C" ? B.up : B.down, fontWeight: 600 }}>
                    {selectedTx?.signo === "C" ? "+" : "−"}{fmt(result?.transaccion?.monto)}
                  </span>
                </div>
              )}
            </div>

            {/* Pipeline metrics */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
              {[
                { l: "E2E Total", v: `${result.total_e2e_ms}ms`, c: B.yellow },
                { l: "Polls", v: result.polls || "—", c: B.white },
                { l: "Pipeline", v: result.pipeline?.modo === "kafka" ? "Kafka→ASP" : "Direct", c: B.info },
              ].map((m, i) => (
                <div key={i} style={{ background: "rgba(255,255,255,0.04)", borderRadius: 10, padding: "10px 10px", textAlign: "center" }}>
                  <div style={{ fontSize: 8, color: "rgba(255,255,255,0.35)", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>{m.l}</div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: m.c, marginTop: 3, fontFamily: MONO }}>{m.v}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Polling status */}
        {isActive && (
          <div style={{ textAlign: "center", marginTop: 12, fontSize: 10, color: "rgba(255,255,255,0.3)", fontFamily: MONO }}>
            Polling cada 300ms · #{pollCount.current} verificaciones
          </div>
        )}
      </div>
    </div>
  );
}

      <div style={{background:B.white,borderRadius:16,padding:"16px 18px",border:`1px solid ${B.g200}`,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:B.black,marginBottom:12,letterSpacing:-0.2}}>Resumen del período</div>
        {[["Transacciones",d.resumen?.num_transacciones?.toLocaleString()],["Canales",(d.resumen?.canales_usados||[]).join(", ")],["Período",`${fD(d.periodo?.desde)} — ${fD(d.periodo?.hasta)}`],["Mostrados",`${d.movimientos_mostrados} de ${d.total_movimientos_periodo}`]].map(([l,v],i)=>
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<3?`1px solid ${B.g100}`:"none",fontSize:12}}><span style={{color:B.g500}}>{l}</span><span style={{fontWeight:600,color:B.black}}>{v}</span></div>
        )}
      </div>
      <div style={{fontSize:13,fontWeight:700,color:B.black,marginBottom:10,letterSpacing:-0.2}}>Movimientos</div>
      {(d.movimientos||[]).slice(0,15).map((m,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${B.g100}`,fontSize:12}}>
        <div><div style={{fontWeight:600,color:B.black}}>{m.tipo}</div><div style={{color:B.g500,marginTop:2,fontSize:11}}>{m.canal} · {fD(m.fecha)}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontWeight:700,color:m.signo==="C"?B.up:B.black}}>{m.signo==="C"?"+":"−"}{fmt(m.monto)}</div><div style={{color:B.g400,fontSize:10,fontFamily:MONO}}>→ {fmt(m.saldo)}</div></div>
      </div>)}
    </>}
  </div>;
}

// ═══ MAIN ═══
function App(){
  const [apiBase,setApiBase]=useState(API_DEFAULT);
  const [cuenta,setCuenta]=useState(null);
  const [tab,setTab]=useState("saldo");
  const api=useApi(apiBase);
  if(!cuenta) return <Login onLogin={setCuenta} apiBase={apiBase} setApiBase={setApiBase}/>;
  const tabs=[{id:"saldo",label:"Saldo",icon:I.wallet},{id:"mov",label:"Movimientos",icon:I.list},{id:"search",label:"Buscar",icon:I.search},{id:"estado",label:"Extracto",icon:I.doc}];
  return <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:B.offWhite,fontFamily:FONT,display:"flex",flexDirection:"column",boxShadow:"0 0 80px rgba(0,0,0,0.06)"}}>
    <div style={{background:B.darkest,color:B.white}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 20px 0",fontSize:10,color:"rgba(255,255,255,0.4)"}}>
        <span style={{display:"flex",alignItems:"center",gap:4}}>{I.lock} ODL Demo</span>
        <Pill ms={api.ms} dark/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 20px 16px"}}>
        <div><div style={{fontSize:20,fontWeight:800,letterSpacing:-0.5}}>Bancolombia</div><div style={{fontSize:11,color:"rgba(255,255,255,0.45)",fontFamily:MONO,marginTop:2}}>{cuenta}</div></div>
        <button onClick={()=>setCuenta(null)} style={{padding:"7px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.7)",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>Salir</button>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",paddingTop:16}}>
      {tab==="saldo"&&<TabSaldo cuenta={cuenta} api={api} apiBase={apiBase}/>}
      {tab==="mov"&&<TabMov cuenta={cuenta} api={api}/>}
      {tab==="search"&&<TabSearch api={api}/>}
      {tab==="estado"&&<TabEstado cuenta={cuenta} api={api}/>}
    </div>
    <div style={{display:"flex",borderTop:`1px solid ${B.g200}`,background:B.white,padding:"4px 0 env(safe-area-inset-bottom, 6px)"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"9px 0",border:"none",background:"none",cursor:"pointer",transition:"color .15s",color:tab===t.id?B.black:B.g400}}>
        <span style={{display:"flex",transform:tab===t.id?"scale(1.1)":"scale(1)",transition:"transform .15s"}}>{t.icon}</span>
        <span style={{fontSize:10,fontWeight:tab===t.id?700:500,fontFamily:FONT}}>{t.label}</span>
        {tab===t.id&&<div style={{width:4,height:4,borderRadius:2,background:B.yellow,marginTop:-1}}/>}
      </button>)}
    </div>
    <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');@keyframes bspin{to{transform:rotate(360deg)}}@keyframes bpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.05)}}@keyframes bpop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}*{box-sizing:border-box;margin:0;padding:0}body{margin:0;background:${B.g200}}input:focus{border-color:${B.black}!important;box-shadow:0 0 0 3px rgba(0,0,0,0.06)}button:active{transform:scale(0.97)}::-webkit-scrollbar{width:0}`}</style>
  </div>;
}

// ═══ RENDER ═══
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
